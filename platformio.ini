; PlatformIO Project Configuration File

[env:esp32-s3-devkitc-1]
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.arduino.memory_type = qio_opi

build_flags =
	-DBOARD_HAS_PSRAM
	-DCORE_DEBUG_LEVEL=4
	-I include

lib_deps =
	olikraus/U8g2@2.36.18
