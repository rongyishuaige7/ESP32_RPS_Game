name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware-build:
    name: PlatformIO firmware build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio==6.1.19

      - name: Check public historical materials
        run: python scripts/check_public_materials.py

      - name: Build firmware
        run: pio run

      - name: Collect firmware artifacts
        run: |
          mkdir -p artifacts
          cp .pio/build/esp32-s3-devkitc-1/firmware.bin artifacts/
          cp .pio/build/esp32-s3-devkitc-1/firmware.elf artifacts/
          cp .pio/build/esp32-s3-devkitc-1/bootloader.bin artifacts/
          cp .pio/build/esp32-s3-devkitc-1/partitions.bin artifacts/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: esp32-rps-firmware-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
